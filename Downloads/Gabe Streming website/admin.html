<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Velostream</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div id="auth-container" style="display: none;">
        <div class="auth-form-container">
            <h2>Login or Sign Up</h2>
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <button type="submit" id="auth-submit-btn">Login</button>
                <button type="button" id="auth-signup-btn">Sign Up</button>
            </form>
            <p id="auth-message" style="color: red;"></p>
        </div>
    </div>

    <div id="authenticated-content" style="display: none;">

    <header class="navbar animate-on-scroll fade-in">
        <div class="container">
            <h1 class="logo"><a href="index.html">MyStreams</a></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="events.html">Live Events</a></li>
                    <li><a href="channels.html">24/7 Channels</a></li>
                    <li><a href="admin.html">Admin</a></li>
                    <li id="auth-nav-items" style="display: none;">
                        <span id="user-info-span" style="color: white; margin-right: 10px;"></span>
                        <button id="logout-button-nav" class="btn-small">Logout</button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container content">
        <div class="admin-container animate-on-scroll slide-up animation-delay-300">
            <h2>Admin Panel</h2>

            <div id="login-container" class="animate-on-scroll slide-up animation-delay-600">
                <h3>Login</h3>
                <form id="login-form">
                    <div class="form-group">
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-submit">Login</button>
                    <p id="login-error" style="color: red; margin-top: 10px;">Invalid username or password.</p>
                </form>
            </div>

            <div id="admin-content" style="display: none;" class="animate-on-scroll slide-up animation-delay-600">
                <h3>Add New Stream</h3>
                <form id="stream-form">
                    <div class="form-group">
                        <label for="streamUrl">Stream URL:</label>
                        <input type="url" id="streamUrl" placeholder="e.g., https://example.com/stream.m3u8" required>
                    </div>
                    <div class="form-group">
                        <label for="eventName">Event Name:</label>
                        <input type="text" id="eventName" placeholder="e.g., Sprint Car Race" required>
                    </div>
                    <div class="form-group">
                        <label>Stream Type:</label>
                        <div class="radio-group">
                            <input type="radio" id="typeEvent" name="streamType" value="event" checked>
                            <label for="typeEvent">Live Event</label>
                            <input type="radio" id="typeReplay" name="streamType" value="replay">
                            <label for="typeReplay">Event Replay</label>
                            <input type="radio" id="type247" name="streamType" value="24/7 Channel">
                            <label for="type247">24/7 Channel</label>
                        </div>
                    </div>
                    <div class="form-group" id="event-category-group">
                        <label for="eventCategory">Event Category:</label>
                        <select id="eventCategory">
                            <option value="Sprint Car">Sprint Car</option>
                            <option value="Late Model">Late Model</option>
                            <option value="Modified">Modified</option>
                            <option value="Motorsport">Motorsport</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group" id="event-start-time-group">
                        <label for="eventStartTime">Event Start Time:</label>
                        <input type="datetime-local" id="eventStartTime">
                    </div>
                    <div class="form-group">
                        <input type="checkbox" id="isPostponed">
                        <label for="isPostponed">Mark as Postponed</label>
                    </div>
                    <div class="form-group" id="postponement-reason-group" style="display: none;">
                        <label for="postponementReason">Reason for Postponement:</label>
                        <textarea id="postponementReason" placeholder="e.g., Inclement weather"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="imageUrl">Image URL (Optional):</label>
                        <input type="url" id="imageUrl" placeholder="e.g., https://example.com/image.jpg">
                    </div>
                    <button type="submit" class="btn-submit">Add Stream</button>
                </form>

                <div class="stream-list animate-on-scroll slide-up animation-delay-700">
                    <h3>Current Streams</h3>
                    <ul id="current-streams-list">
                        <div class="loading-spinner"></div>
                        <p class="loading-text">Loading streams...</p>
                    </ul>
                </div>
                <div class="delete-buttons-group animate-on-scroll slide-up animation-delay-800" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button id="delete-all-btn" class="btn-submit delete-all-btn-style">Delete All</button>
                    <button id="delete-events-btn" class="btn-submit delete-events-btn-style">Delete Events</button>
                    <button id="delete-replays-btn" class="btn-submit delete-replays-btn-style">Delete Replays</button>
                    <button id="delete-channels-btn" class="btn-submit delete-channels-btn-style">Delete 24/7</button>
                </div>
                <button id="logout-button" class="btn-submit logout-btn-style">Logout</button>
            </div>
        </div>
    </main>

    </div> <!-- Close authenticated-content -->

    <footer class="footer animate-on-scroll fade-in animation-delay-900">
        <div class="container">
            <p>&copy; 2026 MyStreams. All rights reserved.</p>
        </div>
    </footer>

    <button id="scroll-to-top" class="scroll-to-top-btn" title="Go to top">&uarr;</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize animations
            window.initAnimations();


            // Supabase Auth Integration
            const authForm = document.getElementById('auth-form');
            const authEmail = document.getElementById('auth-email');
            const authPassword = document.getElementById('auth-password');
            const authSubmitBtn = document.getElementById('auth-submit-btn');
            const authSignupBtn = document.getElementById('auth-signup-btn');
            const authMessage = document.getElementById('auth-message');
            const logoutButtonNav = document.getElementById('logout-button-nav'); // Nav logout button

            // Admin Login Specific Elements
            const loginContainer = document.getElementById('login-container');
            const adminContent = document.getElementById('admin-content');
            const loginForm = document.getElementById('login-form');
            const loginError = document.getElementById('login-error');
            const adminLogoutButton = document.getElementById('logout-button'); // Admin panel logout button



            // Supabase and Admin Auth Status Handler
            window.handleAdminPageAuthStatus = async function() {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                const user = session?.user;

                const authenticatedContent = document.getElementById('authenticated-content');
                const authNavItems = document.getElementById('auth-nav-items');
                const userInfoSpan = document.getElementById('user-info-span');
                const authContainer = document.getElementById('auth-container');


                if (user) {
                    // User is authenticated via Supabase
                    authContainer.style.display = 'none';
                    authenticatedContent.style.display = 'block';
                    authNavItems.style.display = 'block';
                    userInfoSpan.textContent = `Logged in as: ${user.email}`;

                    // Check for admin-specific login for admin page access
                    if (window.location.pathname.includes('admin.html')) {
                        if (user.user_metadata && user.user_metadata.is_admin) {
                            loginContainer.style.display = 'none';
                            adminContent.style.display = 'block';
                            renderStreams();
                            handleStreamTypeChange();
                            handlePostponedChange();
                        } else {
                            // Supabase user logged in, but not an admin
                            loginContainer.style.display = 'block';
                            adminContent.style.display = 'none';
                            authMessage.textContent = 'You do not have admin privileges.';
                        }
                    }

                } else {
                    // No Supabase session, show auth container
                    authContainer.style.display = 'flex';
                    authenticatedContent.style.display = 'none';
                    authNavItems.style.display = 'none';
                    userInfoSpan.textContent = '';

                    // Reset admin session if no Supabase session
                    sessionStorage.removeItem('isAdminLoggedIn');
                    loginContainer.style.display = 'block';
                    adminContent.style.display = 'none';
                }
            }

            // Supabase Auth Event Listeners
            if (authForm) {
                authForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = authEmail.value;
                    const password = authPassword.value;
                    const { error } = await window.signIn(email, password);
                    if (error) {
                        authMessage.textContent = error.message;
                    } else {
                        authMessage.textContent = '';
                        await window.handleAuthStatus(); // Update UI after login
                    }
                });
            }

            if (authSignupBtn) {
                authSignupBtn.addEventListener('click', async () => {
                    const email = authEmail.value;
                    const password = authPassword.value;
                    const { error } = await window.signUp(email, password);
                    if (error) {
                        authMessage.textContent = error.message;
                    } else {
                        authMessage.textContent = '';
                        await window.handleAuthStatus(); // Update UI after signup
                    }
                });
            }

            if (logoutButtonNav) {
                logoutButtonNav.addEventListener('click', async () => {
                    await window.signOut();
                    await window.handleAuthStatus(); // Update UI after logout
                });
            }



            // Admin Logout Button (Existing)
            if (adminLogoutButton) {
                adminLogoutButton.addEventListener('click', async function() {
                    await window.signOut();
                });
            }


            // Supabase Stream Management Logic (Existing) - assuming these are globally available or properly scoped
            // These functions are already in script.js or defined in this block
            async function addStream(newStream) {
                const { data, error } = await supabaseClient
                    .from('streams')
                    .insert([newStream]);

                if (error) {
                    console.error('Error adding stream in addStream function:', error.message);
                    alert('Failed to add stream.');
                    return null;
                }
                return data;
            }

            async function updateStream(id, updatedStream) {
                const { data, error } = await supabaseClient
                    .from('streams')
                    .update(updatedStream)
                    .eq('id', id);

                if (error) {
                    console.error('Error updating stream in updateStream function:', error.message);
                    alert('Failed to update stream.');
                    return null;
                }
                return data;
            }

            async function deleteStream(id) {
                const { error } = await supabaseClient
                    .from('streams')
                    .delete()
                    .eq('id', id);

                if (error) {
                    console.error('Error deleting stream:', error.message);
                    alert('Failed to delete stream.');
                }
            }

            async function deleteStreamsByType(type) {
                const { error } = await supabaseClient
                    .from('streams')
                    .delete()
                    .eq('streamType', type);

                if (error) {
                    console.error('Error deleting streams by type:', error.message);
                    alert('Failed to delete streams by type.');
                }
            }

            let editingStreamId = null;

            async function renderStreams() {
                showSpinner('current-streams-list');
                const streams = await window.getStreams(); // Use window.getStreams if it's global
                currentStreamsList.innerHTML = '';

                if (streams.length === 0) {
                    currentStreamsList.innerHTML = '<p style="color: #ccc; text-align: center;" class="loading-text">No streams added yet.</p>';
                    hideSpinner('current-streams-list');
                    return;
                }

                streams.forEach(stream => {
                    const streamItem = document.createElement('div');
                    streamItem.className = 'stream-item';
                    const displayStartTime = stream.eventStartTime ? new Date(stream.eventStartTime).toLocaleString() : 'N/A';
                    streamItem.innerHTML = `
                        <div class="stream-item-details">
                            <h4>${stream.eventName} (${stream.streamType})</h4>
                            <p><strong>URL:</strong> ${stream.streamUrl}</p>
                            <p><strong>Category:</strong> ${stream.eventCategory}</p>
                            <p><strong>Image:</strong> ${stream.imageUrl}</p>
                            <p><strong>Start Time:</strong> ${displayStartTime}</p>
                            ${stream.isPostponed ? `<p><strong>Status:</strong> <span class="status-badge postponed-badge">Postponed</span></p><p><strong>Reason:</strong> ${stream.postponementReason || 'No reason provided'}</p>` : `<p><strong>Status:</strong> <span class="status-badge active-badge">Active</span></p>`}
                        </div>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <button class="delete-btn" data-id="${stream.id}">Delete</button>
                            <button class="edit-btn" data-id="${stream.id}">Edit</button>
                        </div>
                    `;
                    currentStreamsList.appendChild(streamItem);
                });

                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', async function() {
                        const id = this.dataset.id;
                        if (confirm('Are you sure you want to delete this stream?')) {
                            await deleteStream(id);
                            renderStreams();
                        }
                    });
                });

                document.querySelectorAll('.edit-btn').forEach(button => {
                    button.addEventListener('click', async function() {
                        const id = this.dataset.id;
                        await loadStreamForEdit(id);
                    });
                });
                hideSpinner('current-streams-list');
            }

            async function loadStreamForEdit(id) {
                const streams = await window.getStreams();
                const streamToEdit = streams.find(s => s.id === id);

                if (streamToEdit) {
                    streamUrlInput.value = streamToEdit.streamUrl;
                    eventNameInput.value = streamToEdit.eventName;
                    imageUrlInput.value = streamToEdit.imageUrl;
                    eventStartTimeInput.value = streamToEdit.eventStartTime;
                    isPostponedCheckbox.checked = streamToEdit.isPostponed;
                    postponementReasonInput.value = streamToEdit.postponementReason || '';

                    document.querySelector(`input[name="streamType"][value="${streamToEdit.streamType}"]`).checked = true;
                    handleStreamTypeChange();
                    handlePostponedChange();

                    document.getElementById('stream-form').querySelector('button[type="submit"]').textContent = 'Update Stream';
                    const cancelButton = document.createElement('button');
                    cancelButton.textContent = 'Cancel Edit';
                    cancelButton.type = 'button';
                    cancelButton.className = 'btn-submit cancel-edit-btn';
                    cancelButton.addEventListener('click', resetStreamForm);
                    document.getElementById('stream-form').appendChild(cancelButton);

                    editingStreamId = id;
                } else {
                    alert('Stream not found for editing.');
                }
            }

            function resetStreamForm() {
                streamUrlInput.value = '';
                eventNameInput.value = '';
                imageUrlInput.value = '';
                eventStartTimeInput.value = '';
                isPostponedCheckbox.checked = false;
                postponementReasonInput.value = '';
                handlePostponedChange();

                document.querySelector('input[name="streamType"][value="event"]').checked = true;
                handleStreamTypeChange();

                document.getElementById('stream-form').querySelector('button[type="submit"]').textContent = 'Add Stream';
                const cancelButton = document.querySelector('.cancel-edit-btn');
                if (cancelButton) {
                    cancelButton.remove();
                }
                editingStreamId = null;
            }

            // Stream Form Elements
            const streamForm = document.getElementById('stream-form');
            const streamUrlInput = document.getElementById('streamUrl');
            const eventNameInput = document.getElementById('eventName');
            const eventCategorySelect = document.getElementById('eventCategory');
            const eventStartTimeInput = document.getElementById('eventStartTime');
            const imageUrlInput = document.getElementById('imageUrl');
            const isPostponedCheckbox = document.getElementById('isPostponed');
            const postponementReasonInput = document.getElementById('postponementReason');
            const postponementReasonGroup = document.getElementById('postponement-reason-group');
            const streamTypeRadios = document.querySelectorAll('input[name="streamType"]');
            const eventCategoryGroup = document.getElementById('event-category-group');
            const eventStartTimeGroup = document.getElementById('event-start-time-group');
            const currentStreamsList = document.getElementById('current-streams-list');

            // Helper functions for loading spinner
            function showSpinner(containerId) {
                const container = document.getElementById(containerId);
                if (container) {
                    const spinner = container.querySelector('.loading-spinner');
                    const loadingText = container.querySelector('p.loading-text');
                    if (spinner) spinner.style.display = 'block';
                    if (loadingText) loadingText.style.display = 'block';
                }
            }

            function hideSpinner(containerId) {
                const container = document.getElementById(containerId);
                if (container) {
                    const spinner = container.querySelector('.loading-spinner');
                    const loadingText = container.querySelector('p.loading-text');
                    if (spinner) spinner.style.display = 'none';
                    if (loadingText) loadingText.style.display = 'none';
                }
            }

            function handlePostponedChange() {
                if (isPostponedCheckbox.checked) {
                    postponementReasonGroup.style.display = 'block';
                    postponementReasonInput.setAttribute('required', '');
                } else {
                    postponementReasonGroup.style.display = 'none';
                    postponementReasonInput.removeAttribute('required');
                    postponementReasonInput.value = '';
                }
            }
            isPostponedCheckbox.addEventListener('change', handlePostponedChange);

            function handleStreamTypeChange() {
                const selectedStreamType = document.querySelector('input[name="streamType"]:checked').value;
                if (selectedStreamType === '24/7 Channel') {
                    eventCategoryGroup.style.display = 'none';
                    eventCategorySelect.value = '24/7 Channel';
                    eventStartTimeGroup.style.display = 'none';
                    eventStartTimeInput.removeAttribute('required');
                } else if (selectedStreamType === 'replay') {
                    eventCategoryGroup.style.display = 'none';
                    eventStartTimeGroup.style.display = 'none';
                    eventStartTimeInput.removeAttribute('required');
                } else {
                    eventCategoryGroup.style.display = 'block';
                    eventCategorySelect.value = 'Sprint Car';
                    eventStartTimeGroup.style.display = 'block';
                    eventStartTimeInput.setAttribute('required', '');
                }
            }
            streamTypeRadios.forEach(radio => {
                radio.addEventListener('change', handleStreamTypeChange);
            });

            document.getElementById('delete-all-btn').addEventListener('click', async () => {
                if (confirm('Are you sure you want to delete ALL streams?')) {
                    const { error } = await supabaseClient.from('streams').delete().neq('id', '0');
                    if (error) {
                        console.error('Error deleting all streams:', error.message);
                        alert('Failed to delete all streams.');
                    } else {
                        renderStreams();
                    }
                }
            });

            document.getElementById('delete-events-btn').addEventListener('click', async () => {
                if (confirm('Are you sure you want to delete all EVENT streams?')) {
                    await deleteStreamsByType('event');
                    renderStreams();
                }
            });

            document.getElementById('delete-replays-btn').addEventListener('click', async () => {
                if (confirm('Are you sure you want to delete all REPLAY streams?')) {
                    await deleteStreamsByType('replay');
                    renderStreams();
                }
            });

            document.getElementById('delete-channels-btn').addEventListener('click', async () => {
                if (confirm('Are you sure you want to delete all 24/7 CHANNEL streams?')) {
                    await deleteStreamsByType('24/7 Channel');
                    renderStreams();
                }
            });

            streamForm.addEventListener('submit', async function(event) {
                event.preventDefault();

                const selectedStreamType = document.querySelector('input[name="streamType"]:checked').value;
                const isPostponed = isPostponedCheckbox.checked;
                const postponementReason = isPostponed ? postponementReasonInput.value : null;

                const newStream = {
                    streamUrl: streamUrlInput.value,
                    eventName: eventNameInput.value,
                    streamType: selectedStreamType,
                    eventCategory: (selectedStreamType === 'event') ? eventCategorySelect.value : null,
                    eventStartTime: (selectedStreamType === 'event') ? eventStartTimeInput.value : null,
                    imageUrl: imageUrlInput.value || null,
                    isPostponed: isPostponed,
                    postponementReason: postponementReason
                };

                if (editingStreamId) {
                    await updateStream(editingStreamId, newStream);
                } else {
                    await addStream(newStream);
                }
                resetStreamForm();
                renderStreams();
            });

            // Initial call to handle combined auth status
            window.handleAuthStatus();

            // Listen for auth state changes from Supabase
            window.supabaseClient.auth.onAuthStateChange((event, session) => {
                console.log('Supabase auth state changed:', event, session);
                handleCombinedAuthStatus();
            });
        });
    </script>
</body>
</html>
