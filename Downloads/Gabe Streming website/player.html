<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player - Velostream</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .player-container {
            max-width: 1300px;
            margin: 24px auto;
            padding: 16px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }
        .player-panel {
            background: #1b1b1b;
            border: 1px solid #2f2f2f;
            border-radius: 10px;
            padding: 14px;
        }
        .player-title {
            margin: 0 0 12px;
            font-size: 1.7rem;
            color: #00aaff;
        }
        .live-flag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            background: linear-gradient(110deg, #f73d4d, #c12834);
            border-radius: 999px;
            color: white;
            font-size: 0.82rem;
            font-weight: bold;
            margin-left: 12px;
        }
        .video-wrapper {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: black;
            height: 0;
            padding-bottom: 56.25%;
        }
        .video-wrapper video {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .chat-panel {
            background: #161a23;
            border: 1px solid #232a36;
            border-radius: 10px;
            padding: 14px;
            color: #eee;
            min-height: 540px;
        }
        .chat-panel h3 { margin-top: 0; }
        .chat-messages {
            margin-top: 10px;
            height: 420px;
            overflow-y: auto;
            border: 1px solid #2f3a4d;
            border-radius: 8px;
            background: #0f131a;
            padding: 10px;
        }
        .chat-input {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }
        .chat-input input { flex: 1; }
        .stream-status { display: none !important; }
    </style>
</head>
<body>
    <div id="auth-container" style="display: none;">
        <div class="auth-form-container">
            <h2>Login or Sign Up</h2>
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <button type="submit" id="auth-submit-btn">Login</button>
                <button type="button" id="auth-signup-btn">Sign Up</button>
            </form>
            <p id="auth-message" style="color: red;"></p>
        </div>
    </div>

    <div id="authenticated-content" style="display: none;">

        <header class="navbar">
        <div class="container">
            <h1 class="logo"><a href="index.html">MyStreams</a></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="events.html">Live Events</a></li>
                    <li><a href="channels.html">24/7 Channels</a></li>
                    <li><a href="admin.html">Admin</a></li>
                    <li id="auth-nav-items" style="display: none;">
                        <span id="user-info-span" style="color: white; margin-right: 10px;"></span>
                        <button id="logout-button-nav" class="btn-small">Logout</button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container content">
        <section class="player-container animate-on-scroll fade-in">
            <div class="player-panel animate-on-scroll slide-up animation-delay-300">
                <div>
                    <h2 class="player-title" id="player-title">Loading stream...</h2>
                    <span class="live-flag">• Live Now</span>
                </div>
                <div id="countdown-timer" style="display:none;font-size:1.3em;font-weight:bold;color:#f44336;margin-bottom:12px;"></div>
                <div class="video-wrapper" id="video-wrapper">
                    <video id="streamVideo" controls muted playsinline>
                        <source id="streamSource" src="" type="video/mp4" />
                        Your browser doesn't support HTML5 video.
                    </video>
                </div>
            </div>

            <aside class="chat-panel animate-on-scroll slide-up animation-delay-600">
                <h3>Live Chat</h3>
                <div class="chat-messages" id="chat-messages">
                    <p style="color: #888;">No chat backend yet. This is a placeholder chat panel.</p>
                </div>
                <div class="chat-input">
                        <input id="chat-typed" type="text" placeholder="Type a message...">
                        <button id="chat-send">Send</button>
                </div>
                <p style="color: #888; margin-top: 8px;">Live chat coming soon.</p>
                    <script>
                        // --- Simple Local Live Chat ---
                        const chatMessages = document.getElementById('chat-messages');
                        const chatInput = document.getElementById('chat-typed');
                        const chatSend = document.getElementById('chat-send');
                        // Use streamUrl as chat room key
                        const chatKey = 'chat_' + (streamUrl || 'default');

                        function renderChat() {
                            const messages = JSON.parse(localStorage.getItem(chatKey) || '[]');
                            chatMessages.innerHTML = '';
                            if (messages.length === 0) {
                                chatMessages.innerHTML = '<p style="color:#888;">No messages yet. Be the first to chat!</p>';
                                return;
                            }
                            messages.forEach(msg => {
                                const div = document.createElement('div');
                                div.style.marginBottom = '8px';
                                div.innerHTML = `<span style='color:#00aaff;font-weight:bold;'>${msg.name || 'User'}:</span> <span style='color:#eee;'>${msg.text}</span> <span style='color:#888;font-size:0.8em;'>${msg.time}</span>`;
                                chatMessages.appendChild(div);
                            });
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }

                        function sendChat() {
                            const text = chatInput.value.trim();
                            if (!text) return;
                            const name = localStorage.getItem('chat_name') || 'User';
                            const now = new Date();
                            const time = now.toLocaleTimeString();
                            const messages = JSON.parse(localStorage.getItem(chatKey) || '[]');
                            messages.push({ name, text, time });
                            localStorage.setItem(chatKey, JSON.stringify(messages));
                            chatInput.value = '';
                            renderChat();
                        }

                        chatSend.addEventListener('click', sendChat);
                        chatInput.addEventListener('keydown', function(e) {
                            if (e.key === 'Enter') sendChat();
                        });

                        // Optional: Prompt for a name on first use
                        if (!localStorage.getItem('chat_name')) {
                            const n = prompt('Enter a chat name (nickname):', 'User');
                            if (n) localStorage.setItem('chat_name', n);
                        }

                        renderChat();
                        // Listen for storage changes (multi-tab sync)
                        window.addEventListener('storage', function(e) {
                            if (e.key === chatKey) renderChat();
                        });
                    </script>
            </aside>
        </section>
    </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Initialize animations
            window.initAnimations();

            // Supabase Auth Logic


            const authForm = document.getElementById('auth-form');
            const authEmail = document.getElementById('auth-email');
            const authPassword = document.getElementById('auth-password');
            const authSubmitBtn = document.getElementById('auth-submit-btn');
            const authSignupBtn = document.getElementById('auth-signup-btn');
            const authMessage = document.getElementById('auth-message');

            if (authForm) {
                authForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = authEmail.value;
                    const password = authPassword.value;
                    authMessage.textContent = '';
                    const { error } = await window.signIn(email, password);
                    if (error) {
                        authMessage.textContent = error.message;
                    } else {
                        await window.handleAuthStatus();
                    }
                });
            }

            if (authSignupBtn) {
                authSignupBtn.addEventListener('click', async () => {
                    const email = authEmail.value;
                    const password = authPassword.value;
                    authMessage.textContent = '';
                    const { error } = await window.signUp(email, password);
                    if (error) {
                        authMessage.textContent = error.message;
                    } else {
                        authMessage.textContent = 'Sign up successful! Please check your email for confirmation.';
                        await window.handleAuthStatus();
                    }
                });
            }

            const logoutButton = document.getElementById('logout-button-nav');
            if (logoutButton) {
                logoutButton.addEventListener('click', async () => {
                    await window.signOut();
                    await window.handleAuthStatus();
                });
            }

            // Original Player Logic
            function getURLParam(name) {
                return new URLSearchParams(window.location.search).get(name);
            }

            // Countdown timer logic
            const urlParams = new URLSearchParams(window.location.search);
            const eventStart = urlParams.get('start');
            const countdownDiv = document.getElementById('countdown-timer');
            const videoWrapper = document.getElementById('video-wrapper');
            function updateCountdown() {
                if (!eventStart) return false;
                const startTime = new Date(eventStart).getTime();
                const now = Date.now();
                const diff = startTime - now;
                if (diff > 0) {
                    const hours = Math.floor(diff / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    countdownDiv.textContent = `Stream starts in ${hours > 0 ? hours + 'h ' : ''}${mins}m ${secs}s`;
                    countdownDiv.style.display = '';
                    videoWrapper.style.display = 'none';
                    return true;
                } else {
                    countdownDiv.style.display = 'none';
                    videoWrapper.style.display = '';
                    return false;
                }
            }
            if (eventStart) {
                if (updateCountdown()) {
                    const interval = setInterval(() => {
                        if (!updateCountdown()) clearInterval(interval);
                    }, 1000);
                }
            }
            const video = document.getElementById('streamVideo');
            const source = document.getElementById('streamSource');
            const status = document.getElementById('player-status');
            const title = document.getElementById('player-title');

            const streamUrl = getURLParam('url');
            const streamName = getURLParam('name') || 'Live Stream';

            function setError(message) {
                if (status) {
                    status.textContent = message;
                    status.style.color = '#d32f2f';
                } else {
                    console.error(message);
                }
            }

            function setSuccess(message) {
                if (status) {
                    status.textContent = message;
                    status.style.color = '#2f7a2f';
                } else {
                    console.log(message);
                }
            }

            function tryNativePlayback(url) {
                source.src = url;
                video.crossOrigin = 'anonymous';
                video.load();
                video.play().then(() => {
                    setSuccess('Streaming now (native).');
                }).catch(() => {
                    setError('Tap play on the player if autoplay is blocked.');
                });
            }

            function isYouTubeUrl(url) {
                return /(youtube\.com\/watch\?v=|youtu\.be\/)/i.test(url);
            }

            function renderYouTubeEmbed(url) {
                const idMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/i);
                if (!idMatch) {
                    setError('Invalid YouTube URL');
                    return;
                }
                const videoId = idMatch[1];
                document.querySelector('.video-wrapper').innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="width:100%;height:100%;position:absolute;top:0;left:0;"></iframe>`;
                setSuccess('Playing YouTube embed.');
            }

            if (!streamUrl) {
                title.textContent = 'No stream selected';
                setError('Go back and choose a stream first.');
                return;
            }

            title.textContent = streamName;
            setSuccess('Loading stream...');

            const isHls = /\.m3u8(\?|$)/i.test(streamUrl);

            if (isYouTubeUrl(streamUrl)) {
                renderYouTubeEmbed(streamUrl);
                return;
            }

            if (isHls && window.Hls && window.Hls.isSupported()) {
                const hls = new Hls();
                hls.on(Hls.Events.ERROR, function (event, data) {
                    console.warn('HLS error:', data);
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR || data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        // fallback attempt
                        tryNativePlayback(streamUrl);
                    } else {
                        setError('Unable to load this stream. Please try another one.');
                    }
                });

                hls.loadSource(streamUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().then(() => {
                        setSuccess('Streaming now (HLS).');
                    }).catch(() => {
                        setError('Tap play on the player if autoplay is blocked.');
                    });
                });
            } else {
                tryNativePlayback(streamUrl);
            }

            video.addEventListener('error', function (event) {
                setError('Unable to play stream, check the URL/CORS/source. ' + (event?.message || ''));
                const fallback = 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_1MB.mp4';
                if (source.src !== fallback) {
                    setSuccess('Switching to fallback sample stream...');
                    tryNativePlayback(fallback);
                }
            });

            video.addEventListener('play', function () {
                setSuccess('Playing now. If autoplay was blocked, press play on the player.');
            });

            video.addEventListener('waiting', function () {
                setSuccess('Buffering...');
            });

            video.addEventListener('playing', function () {
                setSuccess('Live stream active.');
            });
        });
    </script>
<button id="scroll-to-top" class="scroll-to-top-btn" title="Go to top">&uarr;</button>
</body>
</html>
