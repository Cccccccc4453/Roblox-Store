<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream - Velostream</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Hide scrollbars to achieve full-screen effect */
            background-color: #000; /* Black background for video */
        }

        .video-container {
            position: relative;
            width: 100vw; /* Viewport width */
            height: 100vh; /* Viewport height */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* Style for the overlay header, if desired */
        .stream-header-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            color: white;
            padding: 10px 20px;
            box-sizing: border-box;
            z-index: 10; /* Ensure it's above the video */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stream-header-overlay h1 {
            margin: 0;
            font-size: 1.5em;
            color: #00aaff;
        }

        .stream-header-overlay .back-link {
            color: #f0f0f0;
            text-decoration: none;
            font-weight: bold;
        }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 768px) {
            .stream-header-overlay h1 {
                font-size: 1.2em;
            }
        }

    </style>
</head>
<body>
    <div id="auth-container" style="display: none;">
        <div class="auth-form-container">
            <h2>Login or Sign Up</h2>
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <button type="submit" id="auth-submit-btn">Login</button>
                <button type="button" id="auth-signup-btn">Sign Up</button>
            </form>
            <p id="auth-message" style="color: red;"></p>
        </div>
    </div>

    <div id="authenticated-content" style="display: none;">

    <div class="stream-header-overlay">
        <a href="javascript:history.back()" class="back-link">← Back</a>
        <h1 id="stream-title">Live Stream</h1>
        <div id="auth-nav-items" style="display: none;">
            <span id="user-info-span" style="color: white; margin-right: 10px;"></span>
            <button id="logout-button-nav" class="btn-small">Logout</button>
        </div>
        <!-- Additional controls or info can go here -->
    </div>

    <div class="video-container">
        <video id="stream-player" class="video-js vjs-default-skin" controls preload="auto" data-setup='{}'>
            <p class="vjs-no-js">
                To view this video please enable JavaScript, and consider upgrading to a
                web browser that <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a>
            </p>
        </video>
    </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://unpkg.com/@videojs/http-streaming@3.9.0/dist/videojs-http-streaming.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize animations
            window.initAnimations();

            // Supabase Auth Logic
            window.handleAuthStatus();

            const authForm = document.getElementById('auth-form');
            const authEmail = document.getElementById('auth-email');
            const authPassword = document.getElementById('auth-password');
            const authSubmitBtn = document.getElementById('auth-submit-btn');
            const authSignupBtn = document.getElementById('auth-signup-btn');
            const authMessage = document.getElementById('auth-message');

            if (authForm) {
                authForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = authEmail.value;
                    const password = authPassword.value;
                    authMessage.textContent = '';
                    const { error } = await window.signIn(email, password);
                    if (error) {
                        authMessage.textContent = error.message;
                    } else {
                        await window.handleAuthStatus();
                    }
                });
            }

            if (authSignupBtn) {
                authSignupBtn.addEventListener('click', async () => {
                    const email = authEmail.value;
                    const password = authPassword.value;
                    authMessage.textContent = '';
                    const { error } = await window.signUp(email, password);
                    if (error) {
                        authMessage.textContent = error.message;
                    } else {
                        authMessage.textContent = 'Sign up successful! Please check your email for confirmation.';
                        await window.handleAuthStatus();
                    }
                });
            }

            const logoutButton = document.getElementById('logout-button-nav');
            if (logoutButton) {
                logoutButton.addEventListener('click', async () => {
                    await window.signOut();
                    await window.handleAuthStatus();
                });
            }

            // Original Player Logic
            const params = new URLSearchParams(window.location.search);
            const streamUrl = params.get('streamUrl');
            const eventName = params.get('eventName') || 'Live Stream';

            const streamTitleElement = document.getElementById('stream-title');
            if (streamTitleElement) {
                streamTitleElement.textContent = eventName;
            }

            if (streamUrl) {
                console.log('Initializing video.js with stream URL:', streamUrl);
                const player = videojs('stream-player', {
                    autoplay: true,
                    controls: true,
                    preload: 'auto',
                    fluid: true, // Make the player fluidly resize
                    liveui: true,
                    html5: {
                        nativeAudioTracks: false,
                        nativeVideoTracks: false,
                        nativeTextTracks: false,
                        hls: {
                            enableLowInitialPlaylist: true,
                            smoothQualityChange: true,
                            limitRenditionByViewport: true,
                            bandwidth: 0 // Auto-detect bandwidth
                        }
                    }
                });

                player.src({
                    src: streamUrl,
                    type: 'application/x-mpegURL' // For HLS streams
                });

                player.on('error', function() {
                    console.error('Video.js Error:', player.error());
                    // Display a user-friendly message
                    const videoElement = document.getElementById('stream-player');
                    if (videoElement) {
                        videoElement.innerHTML = '<div style="background-color: black; color: white; padding: 20px; text-align: center; height: 100%; display: flex; align-items: center; justify-content: center;"><h3>Error loading stream. Please try again later.</h3><p>Ensure the stream URL is valid and accessible.</p></div>';
                    }
                });
            } else {
                console.error('No stream URL provided.');
                const videoElement = document.getElementById('stream-player');
                if (videoElement) {
                    videoElement.innerHTML = '<div style="background-color: black; color: white; padding: 20px; text-align: center; height: 100%; display: flex; align-items: center; justify-content: center;"><h3>No stream URL provided.</h3><p>Please go back and select a valid stream.</p></div>';
                }
            }
        });
    </script>
</body>
</html>
